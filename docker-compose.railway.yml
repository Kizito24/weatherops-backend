version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: weatherops-postgres
    environment:
      POSTGRES_USER: weatherops
      POSTGRES_PASSWORD: password
      POSTGRES_DB: weatherops
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U weatherops"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: weatherops-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: weatherops-web
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://weatherops:password@postgres:5432/weatherops
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      SECRET_KEY: dev-secret-key-change-in-production
      ENVIRONMENT: development
      DEBUG: "True"
      WEATHERAI_API_KEY: dummy-key
      SENDGRID_API_KEY: dummy-key
      TWILIO_ACCOUNT_SID: dummy-sid
      TWILIO_AUTH_TOKEN: dummy-token
      TWILIO_PHONE_NUMBER: +1234567890
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    restart: unless-stopped

  celery-worker:
    build: .
    container_name: weatherops-celery-worker
    command: celery -A app.workers.celery_app worker --loglevel=info
    environment:
      DATABASE_URL: postgresql+asyncpg://weatherops:password@postgres:5432/weatherops
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      SECRET_KEY: dev-secret-key-change-in-production
      ENVIRONMENT: development
      DEBUG: "False"
      WEATHERAI_API_KEY: dummy-key
      SENDGRID_API_KEY: dummy-key
      TWILIO_ACCOUNT_SID: dummy-sid
      TWILIO_AUTH_TOKEN: dummy-token
      TWILIO_PHONE_NUMBER: +1234567890
    depends_on:
      - postgres
      - redis
      - web
    volumes:
      - .:/app
    restart: unless-stopped

  celery-beat:
    build: .
    container_name: weatherops-celery-beat
    command: celery -A app.workers.celery_app beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      DATABASE_URL: postgresql+asyncpg://weatherops:password@postgres:5432/weatherops
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      SECRET_KEY: dev-secret-key-change-in-production
      ENVIRONMENT: development
      DEBUG: "False"
      WEATHERAI_API_KEY: dummy-key
      SENDGRID_API_KEY: dummy-key
      TWILIO_ACCOUNT_SID: dummy-sid
      TWILIO_AUTH_TOKEN: dummy-token
      TWILIO_PHONE_NUMBER: +1234567890
    depends_on:
      - postgres
      - redis
      - web
    volumes:
      - .:/app
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
