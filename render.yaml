services:
  - type: web
    name: weatherops-api
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements/base.txt
    startCommand: bash start.sh
    envVars:
      - key: PYTHON_VERSION
        value: 3.12
      - key: PORT
        value: 8000
      - key: DATABASE_URL
        fromDatabase:
          name: weatherops-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: weatherops-redis
          type: redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: weatherops-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: weatherops-redis
          type: redis
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRATION_HOURS
        value: '24'

  - type: pserv
    name: weatherops-postgres
    plan: starter
    ipAllowList: []

  - type: redis
    name: weatherops-redis
    plan: starter
    ipAllowList: []

  - type: worker
    name: weatherops-celery-worker
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements/base.txt
    startCommand: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2
    envVars:
      - key: PYTHON_VERSION
        value: 3.12
      - key: DATABASE_URL
        fromDatabase:
          name: weatherops-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: weatherops-redis
          type: redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: weatherops-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: weatherops-redis
          type: redis
          property: connectionString

  - type: worker
    name: weatherops-celery-beat
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements/base.txt
    startCommand: celery -A app.workers.celery_app beat --loglevel=info
    envVars:
      - key: PYTHON_VERSION
        value: 3.12
      - key: DATABASE_URL
        fromDatabase:
          name: weatherops-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: weatherops-redis
          type: redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: weatherops-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: weatherops-redis
          type: redis
          property: connectionString
