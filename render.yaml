services:
  - type: web
    name: weatherops-api
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements/base.txt
    startCommand: bash start.sh
    envVars:
      - key: PYTHON_VERSION
        value: 3.12
      - key: PORT
        value: 8000

  - type: pserv
    name: weatherops-postgres
    runtime: postgres
    plan: starter
    ipAllowList: []
    envVars:
      - key: POSTGRES_USER
        value: weatherops
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: weatherops-postgres
          property: password
      - key: POSTGRES_DB
        value: weatherops

  - type: redis
    name: weatherops-redis
    plan: starter
    ipAllowList: []

  - type: worker
    name: weatherops-celery-worker
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements/base.txt
    startCommand: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2
    envVars:
      - key: PYTHON_VERSION
        value: 3.12

  - type: worker
    name: weatherops-celery-beat
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements/base.txt
    startCommand: celery -A app.workers.celery_app beat --loglevel=info
    envVars:
      - key: PYTHON_VERSION
        value: 3.12
